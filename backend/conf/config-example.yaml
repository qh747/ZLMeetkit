# 信令服务监听
listen: ":8080"

# 可选 TLS（局域网多设备测试访问摄像头需要 HTTPS/WSS）
# 留空则以 HTTP 监听；填写后以 HTTPS 监听。
tls_cert: "cert.pem"
tls_key: "key.pem"

# 前端静态文件目录（相对于可执行文件运行目录），留空则不托管静态文件
static_dir: "../frontend"

# 允许的 WebSocket Origin，留空表示不校验（开发用）
allowed_origins: []

# ZLMediaKit 配置
# 提示：ZLM 流路径中的 app 字段由前端「房间号」决定，不在此处配置。
zlm:
  # ZLM HTTP API 基地址（带 http:// 前缀，不带末尾 /）
  api_base: "http://192.168.31.76:8081"
  # ZLM 配置中的 general.secret
  secret: "IqZLFoY9Kbzr2JjkRT3LSDxwzicnvetN"
# 
# 建议在 ZLMediaKit 的 config.ini 中配置录制完成回调，使录制预览
# 即时可用，无需轮询等待：
#   [hook]
#   on_record_mp4 = https://192.168.31.76:8080/api/zlm-hook/record-mp4
# 注意：若上方 tls_cert/tls_key 已配置（服务以 HTTPS 监听），hook 地址
# 必须使用 https://，否则 ZLM 会收到 400（Client sent an HTTP request to an HTTPS server）。
# 自签证书仅会在 ZLM 日志中打印警告，不影响 hook 功能。