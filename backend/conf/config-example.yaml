# 信令服务 HTTPS 监听
listen: ":7443"
# 管理后台 HTTPS 监听
admin_listen: ":9443"

# TLS 证书（必填；业务与管理端口均仅支持 HTTPS，未配置时启动失败并退出）
tls_cert: "cert.pem"
tls_key: "key.pem"

# 日志级别：debug | info | warn | error（留空默认 info）
log_level: "info"

# 业务静态文件目录
static_dir: "../frontend"
# 管理后台静态文件目录
admin_static_dir: "../../frontend/admin"

# 允许的 WebSocket Origin，留空表示不校验（开发用）
allowed_origins: []

# 业务令牌；留空表示不校验（开发用），仅用于前端业务接入。
token: ""

# 管理员账号，格式：管理员1:密码1;管理员2:密码2
admin_accounts: "admin:changeme"

# ZLMediaKit 配置
# 提示：ZLM 流路径中的 app 字段由前端「房间号」决定，不在此处配置。
zlm:
  # ZLM HTTP API 基地址（带 http:// 前缀，不带末尾 /）
  api_base: "http://127.0.0.1:8081"
  # ZLM 配置中的 general.secret
  secret: "IqZLFoY9Kbzr2JjkRT3LSDxwzicnvetN"