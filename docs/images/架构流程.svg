<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" role="img" aria-label="ZLMeetkit 架构：浏览器通过 WebSocket 信令与 ZLMeetkit 通信，ZLMeetkit 通过 HTTP REST 控制 ZLMediaKit，浏览器与 ZLMediaKit 之间通过 WebRTC ICE/SRTP 直连音视频">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="100%" stop-color="#050607"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.2" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#2ec4b6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2ec4b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#c4a574" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c4a574" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d22"/>
      <stop offset="100%" stop-color="#0d1013"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ec4b6"/>
      <stop offset="100%" stop-color="#1f9e93"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b886"/>
      <stop offset="100%" stop-color="#a8895d"/>
    </linearGradient>
    <linearGradient id="mediaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ec4b6"/>
      <stop offset="100%" stop-color="#c4a574"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2ec4b6"/>
    </marker>
    <marker id="arrowW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c4a574"/>
    </marker>
    <marker id="arrowM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#8ec9bf"/>
    </marker>
  </defs>

  <rect width="1200" height="460" fill="url(#bgGrad)"/>
  <rect width="1200" height="460" fill="url(#grid)"/>
  <rect width="1200" height="460" fill="url(#glowA)"/>
  <rect width="1200" height="460" fill="url(#glowB)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="Inter, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="600" fill="#f4f4f5" letter-spacing="-0.5">ZLMeetkit 架构 · Architecture</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="13" fill="#8b919a" letter-spacing="1">SIGNALING · REST · WEBRTC MEDIA</text>

  <!-- ============ Nodes ============ -->
  <!-- Browser -->
  <g transform="translate(60 150)">
    <rect width="260" height="160" rx="20" fill="url(#nodeGrad)" stroke="#2ec4b6" stroke-opacity="0.45"/>
    <rect width="260" height="160" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    <!-- browser icon -->
    <g transform="translate(20 24)">
      <rect width="60" height="44" rx="6" fill="#0a0c0f" stroke="#2ec4b6" stroke-opacity="0.5"/>
      <line x1="0" y1="12" x2="60" y2="12" stroke="#2ec4b6" stroke-opacity="0.45"/>
      <circle cx="8" cy="6" r="1.8" fill="#f05252"/>
      <circle cx="14" cy="6" r="1.8" fill="#c4a574"/>
      <circle cx="20" cy="6" r="1.8" fill="#34d399"/>
      <rect x="8" y="20" width="44" height="6" rx="2" fill="#2ec4b6" fill-opacity="0.45"/>
      <rect x="8" y="30" width="30" height="6" rx="2" fill="#ffffff" fill-opacity="0.12"/>
    </g>
    <text x="96" y="42" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#f4f4f5">浏览器</text>
    <text x="96" y="62" font-family="Inter, sans-serif" font-size="12" fill="#8b919a" letter-spacing="1">BROWSER (WebRTC)</text>
    <line x1="20" y1="84" x2="240" y2="84" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="20" y="106" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• 采集音视频（getUserMedia）</text>
    <text x="20" y="124" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• RTCPeerConnection 推 / 拉</text>
    <text x="20" y="142" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• 信令 WebSocket 客户端</text>
  </g>

  <!-- ZLMeetkit -->
  <g transform="translate(470 150)">
    <rect width="260" height="160" rx="20" fill="url(#nodeGrad)" stroke="#2ec4b6" stroke-opacity="0.75"/>
    <rect width="260" height="160" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    <!-- accent corner ribbon -->
    <path d="M0 20 Q0 0 20 0 L70 0 L0 70 Z" fill="#2ec4b6" fill-opacity="0.1"/>
    <g transform="translate(20 24)">
      <rect width="60" height="44" rx="10" fill="#0a0c0f" stroke="#2ec4b6" stroke-opacity="0.65"/>
      <text x="30" y="29" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#2ec4b6">ZL</text>
    </g>
    <text x="96" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#f4f4f5">ZLMeetkit</text>
    <text x="96" y="60" font-family="Inter, sans-serif" font-size="12" fill="#8b919a" letter-spacing="1">GO · SIGNALING SERVER</text>
    <line x1="20" y1="84" x2="240" y2="84" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="20" y="106" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• WebSocket 信令网关</text>
    <text x="20" y="124" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• 房间 / 成员 / 流编排</text>
    <text x="20" y="142" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• 调用 ZLM HTTP API</text>
  </g>

  <!-- ZLMediaKit -->
  <g transform="translate(880 150)">
    <rect width="260" height="160" rx="20" fill="url(#nodeGrad)" stroke="#c4a574" stroke-opacity="0.6"/>
    <rect width="260" height="160" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    <g transform="translate(20 24)">
      <rect width="60" height="44" rx="10" fill="#0a0c0f" stroke="#c4a574" stroke-opacity="0.55"/>
      <text x="30" y="29" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#c4a574">M</text>
    </g>
    <text x="96" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#f4f4f5">ZLMediaKit</text>
    <text x="96" y="60" font-family="Inter, sans-serif" font-size="12" fill="#8b919a" letter-spacing="1">MEDIA SERVER (SFU)</text>
    <line x1="20" y1="84" x2="240" y2="84" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="20" y="106" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• WebRTC 推 / 拉流</text>
    <text x="20" y="124" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• 转封装 / 录制 / 转码</text>
    <text x="20" y="142" font-family="Inter, sans-serif" font-size="12" fill="#d4d4d8">• HTTP API 控制面</text>
  </g>

  <!-- ============ Connections ============ -->
  <!-- WS signaling: Browser <-> ZLMeetkit -->
  <g>
    <line x1="320" y1="210" x2="470" y2="210" stroke="#2ec4b6" stroke-width="2.5" marker-end="url(#arrowA)" marker-start="url(#arrowA)"/>
    <rect x="338" y="178" width="116" height="26" rx="13" fill="#0a0c0f" stroke="#2ec4b6" stroke-opacity="0.5"/>
    <text x="396" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#9ff0e6">WebSocket 信令</text>
  </g>

  <!-- HTTP REST: ZLMeetkit -> ZLMediaKit -->
  <g>
    <line x1="730" y1="210" x2="880" y2="210" stroke="#c4a574" stroke-width="2.5" marker-end="url(#arrowW)"/>
    <rect x="748" y="178" width="116" height="26" rx="13" fill="#0a0c0f" stroke="#c4a574" stroke-opacity="0.5"/>
    <text x="806" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e7cfa3">HTTP REST</text>
  </g>

  <!-- WebRTC media: Browser <-> ZLMediaKit (curved bottom path) -->
  <g>
    <path d="M 190 310 C 190 410 1010 410 1010 310" fill="none" stroke="#8ec9bf" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrowM)" marker-start="url(#arrowM)"/>
    <rect x="510" y="380" width="180" height="30" rx="15" fill="#0a0c0f" stroke="#8ec9bf" stroke-opacity="0.55"/>
    <text x="600" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#cdeae5">WebRTC ICE / SRTP 音视频直连</text>
  </g>

  <!-- legend small -->
  <g transform="translate(60 410)">
    <circle cx="6" cy="6" r="4" fill="#2ec4b6"/>
    <text x="18" y="10" font-family="Inter, sans-serif" font-size="11" fill="#8b919a">控制面（信令）</text>
    <g transform="translate(150 0)">
      <circle cx="6" cy="6" r="4" fill="#c4a574"/>
      <text x="18" y="10" font-family="Inter, sans-serif" font-size="11" fill="#8b919a">控制面（REST）</text>
    </g>
    <g transform="translate(300 0)">
      <circle cx="6" cy="6" r="4" fill="#8ec9bf"/>
      <text x="18" y="10" font-family="Inter, sans-serif" font-size="11" fill="#8b919a">数据面（音视频）</text>
    </g>
  </g>
</svg>
