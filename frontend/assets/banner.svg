<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" width="1600" height="280" role="img" aria-label="ZLMeetkit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="100%" stop-color="#050607"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.1" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2ec4b6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2ec4b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.92" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#c4a574" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c4a574" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#cdeae5"/>
    </linearGradient>
    <!-- mask: fade from left (invisible) to right (visible) -->
    <linearGradient id="fadeMask" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#000000"/>
      <stop offset="55%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <mask id="fadeRight">
      <rect width="100%" height="100%" fill="url(#fadeMask)"/>
    </mask>
  </defs>

  <rect width="1600" height="280" fill="url(#bg)"/>
  <rect width="1600" height="280" fill="url(#glowL)"/>
  <rect width="1600" height="280" fill="url(#glowR)"/>
  <line x1="0" y1="0"   x2="1600" y2="0"   stroke="#2ec4b6" stroke-opacity="0.25"/>

  <style>
    .w { font-family: 'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; font-weight:700; letter-spacing:-4px; }
    .s { font-family: 'Geist Mono','JetBrains Mono','SF Mono',Menlo,monospace; font-weight:500; letter-spacing:6px; }
  </style>

  <!-- ============ Left: wordmark ============ -->
  <g transform="translate(110 0)">
    <text x="0" y="160" class="w" font-size="120" fill="url(#word)">ZLMeetkit</text>
    <rect x="4" y="186" width="96" height="4" rx="2" fill="#2ec4b6"/>
    <text x="4" y="218" class="s" font-size="13" fill="#8b919a">REALTIME  ·  MULTI-PARTY  ·  VIDEO</text>
  </g>

  <!-- ============ Right edge: faint audio waveform, fading in ============ -->
